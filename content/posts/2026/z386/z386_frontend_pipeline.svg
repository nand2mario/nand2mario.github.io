<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 300" role="img" aria-labelledby="title desc">
  <title id="title">z386 front-end pipeline</title>
  <desc id="desc">Diagram showing cache and memory feeding the 16-byte prefetch queue, byte window, decoder, decoded instruction queue, and microcode sequencer.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4b5563"/>
    </marker>
    <style>
      .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 8; }
      .queue { fill: #ecfeff; stroke: #0e7490; stroke-width: 2; rx: 8; }
      .decode { fill: #fff7ed; stroke: #c2410c; stroke-width: 2; rx: 8; }
      .seq { fill: #f0fdf4; stroke: #15803d; stroke-width: 2; rx: 8; }
      .small { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.5; rx: 4; }
      .label { font: 600 18px sans-serif; fill: #0f172a; }
      .note { font: 14px sans-serif; fill: #475569; }
      .tiny { font: 12px monospace; fill: #475569; }
      .arrow { stroke: #4b5563; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .flush { stroke: #dc2626; stroke-width: 2; fill: none; stroke-dasharray: 7 5; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect x="30" y="100" width="125" height="78" class="box"/>
  <text x="92.5" y="130" text-anchor="middle" class="label">Cache /</text>
  <text x="92.5" y="153" text-anchor="middle" class="label">memory</text>
  <text x="92.5" y="198" text-anchor="middle" class="note">32-bit reads</text>

  <rect x="205" y="78" width="178" height="122" class="queue"/>
  <text x="294" y="108" text-anchor="middle" class="label">Prefetch queue</text>
  <text x="294" y="131" text-anchor="middle" class="note">16 bytes = 4 DWORDs</text>
  <rect x="227" y="152" width="28" height="26" class="small"/>
  <rect x="257" y="152" width="28" height="26" class="small"/>
  <rect x="287" y="152" width="28" height="26" class="small"/>
  <rect x="317" y="152" width="28" height="26" class="small"/>
  <text x="241" y="170" text-anchor="middle" class="tiny">0</text>
  <text x="271" y="170" text-anchor="middle" class="tiny">1</text>
  <text x="301" y="170" text-anchor="middle" class="tiny">2</text>
  <text x="331" y="170" text-anchor="middle" class="tiny">3</text>

  <rect x="433" y="88" width="150" height="102" class="box"/>
  <text x="508" y="118" text-anchor="middle" class="label">Byte window</text>
  <text x="508" y="142" text-anchor="middle" class="note">next byte</text>
  <text x="508" y="164" text-anchor="middle" class="note">+ 32-bit view</text>

  <rect x="633" y="78" width="145" height="122" class="decode"/>
  <text x="705.5" y="108" text-anchor="middle" class="label">Decoder FSM</text>
  <text x="705.5" y="133" text-anchor="middle" class="note">prefix</text>
  <text x="705.5" y="153" text-anchor="middle" class="note">opcode / ModR/M</text>
  <text x="705.5" y="173" text-anchor="middle" class="note">disp / imm</text>

  <rect x="818" y="78" width="132" height="122" class="seq"/>
  <text x="884" y="108" text-anchor="middle" class="label">Decoded</text>
  <text x="884" y="131" text-anchor="middle" class="label">queue</text>
  <text x="884" y="160" text-anchor="middle" class="note">microcode</text>
  <text x="884" y="180" text-anchor="middle" class="note">entry + fields</text>

  <path d="M 155 139 H 198" class="arrow"/>
  <path d="M 383 139 H 426" class="arrow"/>
  <path d="M 583 139 H 626" class="arrow"/>
  <path d="M 778 139 H 811" class="arrow"/>

  <path d="M 885 205 C 830 258 485 264 294 210" class="flush"/>
  <text x="548" y="273" text-anchor="middle" class="note">branches, faults, interrupts, and segment changes flush and restart prefetch</text>
</svg>
