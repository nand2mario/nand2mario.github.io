<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 315">
  <style>
    .label { font: 13px 'SFMono-Regular','Menlo','Consolas',monospace; fill: #374151; }
    .sublabel { font: 11.5px system-ui, -apple-system, sans-serif; fill: #6b7280; }
    .head { font: bold 13px system-ui, -apple-system, sans-serif; fill: #374151; }
    .note { font: 11px system-ui, -apple-system, sans-serif; fill: #9ca3af; }
    .lane { font: 12px system-ui, -apple-system, sans-serif; fill: #4b5563; }
    .divider { stroke: #d1d5db; stroke-width: 1; stroke-dasharray: 4 3; }
    .hline { stroke: #e5e7eb; stroke-width: 1; }
    .arrow { stroke: #374151; stroke-width: 1.2; fill: none; marker-end: url(#ah); }
    .darrow { stroke: #9ca3af; stroke-width: 1; fill: none; stroke-dasharray: 4 3; marker-end: url(#ah2); }
  </style>
  <defs>
    <marker id="ah" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="none" stroke="#374151" stroke-width="1"/>
    </marker>
    <marker id="ah2" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="none" stroke="#9ca3af" stroke-width="1"/>
    </marker>
  </defs>

  <!-- Column headers -->
  <text class="head" x="242" y="24" text-anchor="middle">T0</text>
  <text class="head" x="407" y="24" text-anchor="middle">T1</text>
  <text class="head" x="572" y="24" text-anchor="middle">T2</text>
  <text class="head" x="737" y="24" text-anchor="middle">T3</text>
  <text class="note" x="490" y="42" text-anchor="middle">RD read path with early start, no wait state, TLB hit</text>

  <!-- Vertical dividers -->
  <line x1="325" y1="8" x2="325" y2="300" class="divider"/>
  <line x1="490" y1="8" x2="490" y2="300" class="divider"/>
  <line x1="655" y1="8" x2="655" y2="300" class="divider"/>

  <!-- Horizontal lane dividers -->
  <line x1="20" y1="80" x2="900" y2="80" class="hline"/>
  <line x1="20" y1="130" x2="900" y2="130" class="hline"/>
  <line x1="20" y1="180" x2="900" y2="180" class="hline"/>
  <line x1="20" y1="230" x2="900" y2="230" class="hline"/>

  <!-- Lane labels -->
  <text class="lane" x="95" y="70" text-anchor="end">Microcode</text>
  <text class="lane" x="95" y="120" text-anchor="end">Segmentation</text>
  <text class="lane" x="95" y="170" text-anchor="end">Paging / TLB</text>
  <text class="lane" x="95" y="220" text-anchor="end">Bus interface</text>
  <text class="lane" x="95" y="270" text-anchor="end">Read datapath</text>

  <!-- Microcode row -->
  <rect x="167" y="52" width="150" height="20" rx="4" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1.2"/>
  <text class="label" x="242" y="66" text-anchor="middle">early start</text>

  <rect x="332" y="52" width="150" height="20" rx="4" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1.2"/>
  <text class="label" x="407" y="66" text-anchor="middle">039 RD</text>

  <rect x="497" y="52" width="150" height="20" rx="4" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1.2"/>
  <text class="label" x="572" y="66" text-anchor="middle">03A DLY</text>

  <rect x="662" y="52" width="150" height="20" rx="4" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1.2"/>
  <text class="label" x="737" y="66" text-anchor="middle">03B OPR_R -&gt; TMPB</text>

  <!-- Segmentation row -->
  <rect x="167" y="98" width="150" height="24" rx="4" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.2"/>
  <text class="label" x="242" y="113" text-anchor="middle">EA/reloc/limit chk</text>

  <line x1="317" y1="110" x2="362" y2="110" class="arrow"/>
  <text class="note" x="340" y="102" text-anchor="middle">linear request</text>

  <!-- Paging/TLB row -->
  <rect x="332" y="148" width="150" height="24" rx="4" fill="#d1fae5" stroke="#6ee7b7" stroke-width="1.2"/>
  <text class="label" x="407" y="163" text-anchor="middle">TLB lookup / hit</text>

  <line x1="482" y1="160" x2="527" y2="210" class="arrow"/>
  <text class="note" x="500" y="180" text-anchor="middle">phys addr</text>

  <!-- Bus interface row -->
  <rect x="332" y="198" width="150" height="24" rx="4" fill="#fef3c7" stroke="#fcd34d" stroke-width="1.2"/>
  <text class="label" x="407" y="213" text-anchor="middle">start bus cycle</text>
  <text class="note" x="407" y="225" text-anchor="middle">address phase</text>

  <rect x="497" y="198" width="150" height="24" rx="4" fill="#fef3c7" stroke="#fcd34d" stroke-width="1.2"/>
  <text class="label" x="572" y="213" text-anchor="middle">finish bus cycle</text>
  <text class="note" x="572" y="225" text-anchor="middle">data phase</text>

  <line x1="647" y1="210" x2="692" y2="260" class="arrow"/>

  <!-- Read datapath row -->
  <rect x="497" y="248" width="150" height="24" rx="4" fill="#fee2e2" stroke="#fca5a5" stroke-width="1.2"/>
  <text class="label" x="572" y="263" text-anchor="middle">data -&gt; OPR_R</text>

  <rect x="662" y="248" width="150" height="24" rx="4" fill="#fee2e2" stroke="#fca5a5" stroke-width="1.2"/>
  <text class="label" x="737" y="263" text-anchor="middle">OPR_R visible</text>
</svg>
